<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to PDF Converter</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Image to PDF</h1>
            <p>Convert multiple images into a single PDF instantly. 100% offline.</p>
        </header>

        <main>
            <div id="dropzone" class="dropzone">
                <div class="dropzone-content">
                    <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    <p>Drag & drop images here</p>
                    <span>or</span>
                    <label for="file-input" class="btn btn-secondary">Browse Files</label>
                    <input type="file" id="file-input" multiple accept="image/*" hidden>
                </div>
            </div>

            <div class="actions-area hidden" id="actions-area">
                <div class="status-text">
                    <span id="image-count">0</span> images selected
                </div>
                <div class="buttons">
                    <button id="clear-btn" class="btn btn-danger">Clear All</button>
                    <button id="generate-btn" class="btn btn-primary">
                        <span>Generate PDF</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    </button>
                </div>
            </div>

            <div id="preview-grid" class="preview-grid">
                <!-- Image previews will be injected here -->
            </div>
            
            <div id="loading-overlay" class="loading-overlay hidden">
                <div class="spinner"></div>
                <p>Generating PDF...</p>
            </div>
        </main>
    </div>

    <!-- jsPDF Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
